CONFIG_MODULES=y
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y
CONFIG_NET_9P=y
CONFIG_NET_9P_VIRTIO=y
CONFIG_9P_FS=y
CONFIG_9P_FS_POSIX_ACL=y
CONFIG_PCI=y
CONFIG_TUN=m
CONFIG_VIRTIO_PCI=y
CONFIG_ISO9660_FS=y
CONFIG_WIREGUARD=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_TMPFS_XATTR=y
CONFIG_NR_CPUS=512

# BPF
CONFIG_DEBUG_INFO_BTF=y
CONFIG_DEBUG_INFO_BTF_MODULES=y
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y

CONFIG_KPROBES=y
#
CONFIG_PM=n
CONFIG_SUSPEND=n
CONFIG_PM_SLEEP=n
CONFIG_HOTPLUG_CPU=n
CONFIG_HOTPLUG_PCI=n
CONFIG_BT=n
CONFIG_MMC=n
CONFIG_SCSI=n
CONFIG_INPUT=n
CONFIG_WLAN=n

# dm-verity verifies the rootfs in the initramfs (no modules loaded yet), so the
# rootfs hash algorithm must be built-in. linux-yocto-tiny ships SHA256 as a
# module (=m); force it built-in or early verity fails with
# "verity: Cannot initialize hash function (-ENOENT)".
CONFIG_CRYPTO_SHA256=y
CONFIG_CRYPTO_SHA512=y

# Minimal CoCo Confidential Data Hub config for dstack guest images.
# KBS support is compiled in, but keep the baked-in default as offline_fs_kbc
# so the image boots without a KBS URL.  For real CoCo KBS, override this file
# via initdata cdh.toml with [kbc].name = "cc_kbc" and the KBS URL.
# Optional offline resources can be supplied through
# /etc/aa-offline_fs_kbc-resources.json.

socket = "unix:///run/confidential-containers/cdh.sock"

[kbc]
name = "offline_fs_kbc"
url = ""

[log]
level = "info"

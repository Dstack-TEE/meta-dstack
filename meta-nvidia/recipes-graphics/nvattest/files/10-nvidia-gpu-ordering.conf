# Ordering only, not a hard dependency: on GPU instances, `dstack-util setup`
# (run by dstack-prepare.service) performs local GPU TEE attestation per the
# app-compose `requirements.verify_gpu` policy, which needs the nvidia driver
# loaded (nvidia-persistenced) and the NVLink fabric up (nvidia-fabricmanager).
# Both units skip cleanly on GPU-less instances via nvidia-gpu-detect.
[Unit]
Wants=nvidia-persistenced.service nvidia-fabricmanager.service
After=nvidia-persistenced.service nvidia-fabricmanager.service
